name: Build and Deploy to FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          MAINTENANCE_MODE: ${{ vars.MAINTENANCE_MODE || 'false' }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || '' }}
          NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID || '' }}
          NEXT_PUBLIC_ENABLE_TRACKING: ${{ vars.NEXT_PUBLIC_ENABLE_TRACKING || 'false' }}
          NEXT_PUBLIC_META_PIXEL_ID: ${{ vars.NEXT_PUBLIC_META_PIXEL_ID || '' }}

      - name: Inject webhook URL
        run: |
          sed -i 's|__N8N_WEBHOOK_URL__|${{ secrets.N8N_WEBHOOK_URL }}|g' ./out/send-form.php
          cat ./out/send-form.php | grep -c "N8N_WEBHOOK_URL" && echo "ERROR: Placeholder not replaced!" && exit 1 || echo "Webhook URL injected successfully"

      - name: Inject webhook URL in messenger.php
        run: |
          if [ -f ./out/api/messenger.php ]; then
            sed -i 's|__N8N_WEBHOOK_URL__|${{ secrets.N8N_WEBHOOK_URL }}|g' ./out/api/messenger.php
            echo "Webhook URL injected in messenger.php"
          fi

      - name: Inject Meta CAPI secrets
        run: npx tsx scripts/inject-api-secrets.ts
        env:
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}

      - name: Verify injections
        run: |
          echo "--- send-form.php ---"
          grep -c '__N8N_WEBHOOK_URL__\|__PLACEHOLDER__' ./out/send-form.php && echo "ERROR: send-form.php still has placeholders!" && exit 1 || echo "OK"
          echo "--- messenger.php ---"
          if [ -f ./out/api/messenger.php ]; then
            grep -c '\[\[PIXEL_ID\]\]\|\[\[ACCESS_TOKEN\]\]' ./out/api/messenger.php && echo "WARNING: messenger.php still has Meta placeholders (tracking disabled)" || echo "OK: Meta secrets injected"
            grep -c '__N8N_WEBHOOK_URL__' ./out/api/messenger.php && echo "WARNING: messenger.php still has webhook placeholder" || echo "OK: Webhook injected"
          fi

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_PATH }}
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
